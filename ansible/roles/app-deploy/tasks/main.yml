---
- name: Initialize Active Sandbox Directory Workspace Structure
  file:
    path: "/opt/shop"
    state: directory
    mode: '0755'
    owner: ec2-user

- name: Look up this account's ID (used to build the region-local ECR registry hostname)
  shell: "aws sts get-caller-identity --query Account --output text"
  register: aws_account_id
  changed_when: false

- name: Fetch DB credentials and standby status from SSM Parameter Store
  # Secrets never touch the CI runner or a templated file on disk here —
  # they're read directly on the instance via its own IAM role
  # (app_host_ssm_read policy, scoped to this project/environment path).
  shell: "aws ssm get-parameter --name '{{ item.name }}' --with-decryption --region {{ aws_region }} --query Parameter.Value --output text"
  loop:
    - { name: "{{ ssm_parameter_prefix }}/username", var: db_username }
    - { name: "{{ ssm_parameter_prefix }}/password", var: db_password }
  loop_control:
    label: "{{ item.name }}"
  register: ssm_db_creds
  no_log: true
  changed_when: false

- name: Read standby status flag (empty/absent on the primary)
  shell: "aws ssm get-parameter --name '{{ ssm_status_parameter }}' --region {{ aws_region }} --query Parameter.Value --output text"
  register: ssm_status_result
  when: ssm_status_parameter is defined and ssm_status_parameter | length > 0
  changed_when: false
  failed_when: false

- name: Set derived facts (ECR registry host, decrypted DB creds, active/standby role)
  set_fact:
    ecr_registry_url: "{{ aws_account_id.stdout }}.dkr.ecr.{{ aws_region }}.amazonaws.com"
    db_username: "{{ ssm_db_creds.results[0].stdout }}"
    db_password: "{{ ssm_db_creds.results[1].stdout }}"
    dr_active: "{{ (ssm_status_result.stdout | default('active')) == 'active' }}"
  no_log: true

- name: Authenticate Runtime Host Daemon to Amazon ECR Image Registry
  shell: "aws ecr get-login-password --region {{ aws_region }} | docker login --username AWS --password-stdin {{ ecr_registry_url }}"

- name: Populate Local Processing Variable Environments File Mapping
  template:
    src: docker-compose.yml.j2
    dest: /opt/shop/docker-compose.yml
    mode: '0600'
    owner: ec2-user
  no_log: true

- name: Trigger Rolling Standby Stack Instantiation And Await Active Verification Signals
  shell: "docker compose -f /opt/shop/docker-compose.yml up -d --wait --remove-orphans"
  async: 900   # Set maximum wait time to 900 seconds (15 minutes)
  poll: 15
