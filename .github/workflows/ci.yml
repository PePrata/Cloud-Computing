name: "CI Pipeline"

on:
  pull_request:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-dev
  cancel-in-progress: false

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Codebase
        uses: actions/checkout@v4

      - name: Initialize JDK 21 Environment
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Execute Maven Multi-Module Test Suite
        run: mvn clean test

      - name: Authenticate to AWS Cloud via OIDC Broker
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Initialize Terraform Platform Engine
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Dry-Run Verification (Lint & Plan execution)
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
        run: |
          cd terraform/environments/dev
          terraform init
          terraform validate
          terraform plan -no-color
