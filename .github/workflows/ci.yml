name: "CI Pipeline"

on:
  pull_request:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Codebase
        uses: actions/checkout@v4

      - name: Initialize JDK 21 Environment
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Execute Maven Multi-Module Test Suite
        run: mvn clean test

      - name: Authenticate to AWS Cloud via OIDC Broker
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::202373502174:role/gha-deployer
          aws-region: us-east-1

      - name: Initialize Terraform Platform Engine
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Dry-Run Verification (Lint & Plan execution)
        run: |
          cd terraform/environments/dev
          terraform init
          terraform validate
          terraform plan -no-color
